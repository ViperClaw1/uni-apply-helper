<p class="tipp">提醒：为了获得更好的浏览效果，建议您使用谷歌Chrome浏览器登陆本网站。</p>

<script>
var d = [];
$(function(){

    $("#login_submit").on('click',function () {
        if ($('#myform').valid() === true){
            // var data = $('#myform').serialize();

            var data = "";
            $.each($("li").children(),function (i,v) {
                var id = $(this).attr("id");
                if(id == null || id == undefined || id == "undefined"){
                    return true;
                }

                var id_value = $.base64.encode($("#"+id).val(),'utf-8');
                id_value = id_value.replace(/\+/g,'-');
                id_value = id_value.replace(/\//g,'_');
                id_value = id_value.replace(/\=/g,'');

                data += (data==""? "" : "&" )+id+"="+id_value;

            });

            $.ajax({
                url:'/en/student/login/do_login',
                type:'POST',
                data:data,
                beforeSend:function(){
                    d = dialog({
                        id:'cucas_art_dialog',
                        content: '<img src="/resource/home/images/public/loading.gif">'
                    });
                    d.showModal();
                },
                success:function(msg){
                    dialog({id:'cucas_art_dialog'}).close();
                    $(".Change").find('a').trigger('click');
                    $("#code").val('Verification Code');
                    $('#code_class').find('span').removeClass();
                    if(msg.state == 0){
                        var d = dialog({
                            title: 'Message',
                            content: ''+msg.info+''
                        });
                        d.show();
                        setTimeout(function () {
                            d.close().remove();
                        }, 2000);
                        var field = msg.data.field;

                        var input = $('.zyj').find("input[name='"+field+"']");

                        input.css({border:"1px solid #FF0000"}).focus().blur(function(){

                            $(this).css({border:""});

                        });
                    }else if(msg.state == 1){

                        var d = dialog({
                            content: ''+msg.info+''
                        });
                        d.show();
                        setTimeout(function () {
                            d.close().remove();
                        }, 2000);
                        if(msg.data != ''){
                            window.location.href=msg.data;
                        }else{
                            window.location.href='/en/student/index';
                        }

                    }else if(msg.state == 4 || msg.state == 5){
                        var d = dialog({
                            title: 'Message',
                            content:msg.data,
                            cancelValue:'cancel',
                            padding:0,
                            cancel:function () {
                                return true;
                            }
                        });
                        d.showModal();
                    }else if(msg.state == 6){

                        var d = dialog({
                            title: 'Message',
                            content: ''+msg.info+''
                        });
                        d.show();
                        setTimeout(function () {
                            d.close().remove();
                        }, 2000);

                    }
                },
                dataType:'json'
            });
        }
    });
	
	$('#virimg').attr('src','/student/verification/index?'+ new Date().getTime());

});

</script>
